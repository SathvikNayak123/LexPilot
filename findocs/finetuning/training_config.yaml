# ============================================================================
# FinDocs – QLoRA Fine-Tuning Configuration for Phi-3-mini
# ============================================================================
# This file contains every hyperparameter used by the QLoRATrainer.
# Edit values here instead of touching Python code.
# Load with: TrainingConfig.from_yaml("findocs/finetuning/training_config.yaml")
# ============================================================================

# ── Model ────────────────────────────────────────────────────────────────────
base_model: "microsoft/Phi-3-mini-4k-instruct"
output_dir: "./outputs/phi3-findocs-qlora"

# ── Quantisation (BitsAndBytes NF4) ─────────────────────────────────────────
load_in_4bit: true
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "bfloat16"
bnb_4bit_use_double_quant: true

# ── LoRA Adapter ─────────────────────────────────────────────────────────────
lora_r: 16
lora_alpha: 32
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
lora_dropout: 0.05

# ── Training ─────────────────────────────────────────────────────────────────
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 1.0
max_seq_length: 2048
fp16: false
bf16: true
gradient_checkpointing: true

# ── Logging / Checkpoints ───────────────────────────────────────────────────
logging_steps: 10
save_steps: 100
save_total_limit: 3
evaluation_strategy: "steps"
eval_steps: 100
seed: 42

# ── MLflow ───────────────────────────────────────────────────────────────────
mlflow_tracking_uri: "http://localhost:5000"
mlflow_experiment_name: "findocs-phi3-qlora"

# ── Dataset ──────────────────────────────────────────────────────────────────
dataset_target_size: 3000
eval_dataset_size: 200
train_val_split_ratio: 0.9
dedup_similarity_threshold: 0.85

# ── HuggingFace Hub ─────────────────────────────────────────────────────────
hub_repo_id: "your-username/findocs-phi3-finetuned"
