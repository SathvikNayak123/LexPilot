name: Evaluation Gate

on:
  pull_request:
    paths:
      - "serving/**"
      - "evaluation/**"
      - "retrieval/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  eval-gate:
    name: Run Evaluation Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: findocs
          POSTGRES_PASSWORD: findocs
          POSTGRES_DB: findocs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U findocs -d findocs"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "curl -sf http://localhost:6333/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: findocs
      POSTGRES_PASSWORD: findocs
      POSTGRES_DB: findocs
      QDRANT_HOST: localhost
      QDRANT_PORT: 6333

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Initialize database extensions
        run: |
          PGPASSWORD=findocs psql -h localhost -U findocs -d findocs -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run evaluation gate
        id: eval
        run: |
          python -m evaluation.ci_gate --sample-size 50 --comment-file pr_comment.md

      - name: Post PR comment with results
        if: always() && hashFiles('pr_comment.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr_comment.md', 'utf8');

            // Find and update existing bot comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- eval-gate-result -->';
            const existing = comments.find(c => c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Fail if evaluation did not pass
        if: steps.eval.outcome == 'failure'
        run: |
          echo "::error::Evaluation gate failed. See PR comment for details."
          exit 1
